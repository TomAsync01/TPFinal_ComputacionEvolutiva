                pointRadius: 2,
                pointHoverRadius: 5
            }
        ]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
            title: {
                display: true,
                text: 'Evolución del Mejor Fitness',
                font: { size: 18, weight: 'bold' }
            },
            legend: { display: false },
            tooltip: {
                callbacks: {
                    label: function(context) {
                        return 'Fitness: ' + context.parsed.y.toExponential(4);
                    }
                }
            }
        },
        scales: {
            x: {
                title: { display: true, text: 'Generación', font: { size: 14 } }
            },
            y: {
                title: { display: true, text: 'Fitness', font: { size: 14 } },
                ticks: {
                    callback: function(value) {
                        return value.toExponential(2);
                    }
                }
            }
        }
    }
});

const avgDiversity = 0.9296890631808541;
const avgLine = Array(diversity.length).fill(avgDiversity);

new Chart(document.getElementById('diversityChart'), {
    type: 'line',
    data: {
        labels: generations,
        datasets: [
            {
                label: 'Diversidad',
                data: diversity,
                borderColor: 'rgb(153, 102, 255)',
                backgroundColor: 'rgba(153, 102, 255, 0.1)',
                borderWidth: 2,
                fill: false,
                tension: 0.4,
                pointRadius: 0
            },
            {
                label: 'Promedio (' + avgDiversity.toFixed(4) + ')',
                data: avgLine,
                borderColor: 'rgba(255, 99, 132, 0.8)',
                borderWidth: 2,
                borderDash: [5, 5],
                fill: false,
                pointRadius: 0
            },
        ]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
            title: {
                display: true,
                text: 'Evolución de la Diversidad de la Población',
                font: { size: 18 }
            },
            legend: { position: 'top' },
            tooltip: {
                callbacks: {
                    label: function(context) {
                        return context.dataset.label + ': ' + context.parsed.y.toFixed(4);
                    }
                }
            }
        },
        scales: {
            x: { title: { display: true, text: 'Generación' } },
            y: { title: { display: true, text: 'Diversidad' }, beginAtZero: false }
        }
    }
});
</script>
